server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

spring:
  application:
    name: tenant-service

  grpc:
    server:
      port: 9002

    #### Database Configurations ###
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15433/tenant_postgres_db}
    username: ${DB_USERNAME:tenant_user}
    password: ${DB_PASSWORD:tenant_password}
  jpa:
    hibernate:
      ddl-auto: update
  #  sql:
  #    init:
  #      mode: always

  logging:
    level:
      org:
        springframework:
          security=DEBUG

redis:
  host: localhost
  port: 6379

  kafka:
    bootstrap-servers: localhost:9092