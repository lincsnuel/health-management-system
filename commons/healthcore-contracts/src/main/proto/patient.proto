syntax = "proto3";

package patient;

option java_package = "com.healthcore.contracts.patient";
option java_multiple_files = true;

message Date {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string country = 4;
}

message InsurancePolicy {
  string provider_name = 1;
  string policy_number = 2;
  string plan_type = 3;
  Date coverage_start = 4;
  Date coverage_end = 5;
  bool main = 6;
}

message ResponsibleParty {
  string first_name = 1;
  string last_name = 2;
  string type = 3;
  string relationship = 4;
  string contact_number = 5;
  Address address = 6;
}

message RegisterPatientProtoRequest {
  string patient_id = 1;
  string hospital_patient_number = 2;
  string first_name = 3;
  string last_name = 4;
  Date date_of_birth = 5;
  string gender = 6;
  string email = 7;
  string contact_number = 8;
  string identity_type = 9;
  string national_id_number = 10;
  Address address = 11;
  repeated ResponsibleParty responsible_parties = 12;
  InsurancePolicy insurance_policy = 13;
}

message RegisterPatientProtoResponse {
  string patient_id = 1;
  bool success = 2;
  string message = 3;
}

message PatientRequest {
  string patientId = 1;
  string phoneNumber = 2;
}

message PatientResponse {
  string patientId = 1;
  string firstName = 2;
  string lastName = 3;
  string email = 4;
}

service PatientService {
  rpc RegisterPatient(RegisterPatientProtoRequest) returns (RegisterPatientProtoResponse);
  rpc GetPatient(PatientRequest) returns (PatientResponse);
  rpc FindByPhone(PatientRequest) returns (PatientResponse);
}