syntax = "proto3";

package tenant;

option java_package = "com.healthcore.contracts.tenant";
option java_multiple_files = true;

service TenantService {
  rpc ResolveTenant (TenantRequest) returns (TenantResponse);
}

message TenantRequest {
  string subdomain = 1;
}

message TenantResponse {
  string tenantId = 1;
}