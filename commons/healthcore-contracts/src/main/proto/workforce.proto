syntax = "proto3";

package workforce;

option java_package = "com.healthcore.contracts.workforce";
option java_multiple_files = true;

// =========================
// DATE VALUE OBJECT
// =========================
message Date {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

// =========================
// REGISTER STAFF REQUEST
// =========================
message RegisterStaffProtoRequest {

  // Organization
  string department_id = 1;

  // Personal Identity
  string first_name = 2;
  string middle_name = 3;
  string last_name = 4;
  string email = 5;
  string phone_number = 6;
  string gender = 7;
  Date date_of_birth = 8;

  // Classification
  string staff_type = 9;

  // Access Control
  repeated string roles = 10;
}

// =========================
// RESPONSE
// =========================
message RegisterStaffProtoResponse {
  string staff_id = 1;
  bool success = 2;
  string message = 3;
}

// =========================
// SERVICE
// =========================
service WorkforceService {
  rpc RegisterStaff(RegisterStaffProtoRequest)
      returns (RegisterStaffProtoResponse);
}