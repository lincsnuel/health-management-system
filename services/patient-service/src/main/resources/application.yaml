server:
  port: 8083
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

spring:
  application:
    name: patient-service

  grpc:
    server:
      port: 9001
      # You can also add reflection to help with debugging/Postman
      reflection:
        enabled: true

  #### Database Configurations ###
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15432/patient_postgres_db}
    username: ${DB_USERNAME:patient_user}
    password: ${DB_PASSWORD:patient_password}
  jpa:
    hibernate:
      ddl-auto: update
#  sql:
#    init:
#      mode: always

  logging:
    level:
      org:
        springframework:
          security=DEBUG

redis:
  host: localhost
  port: 6379

kafka:
  bootstrap-servers: localhost:9092