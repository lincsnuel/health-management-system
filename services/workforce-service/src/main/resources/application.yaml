server:
  port: 8084
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

spring:
  application:
    name: workforce-service

  kafka:
    bootstrap-servers: localhost:9094

  grpc:
    server:
      port: 9003

    #### Database Configurations ###
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15434/workforce_postgres_db}
    username: ${DB_USERNAME:workforce_user}
    password: ${DB_PASSWORD:workforce_password}
  jpa:
    hibernate:
      ddl-auto: update
  #  sql:
  #    init:
  #      mode: always

  logging:
    level:
      org:
        springframework:
          security=DEBUG

redis:
  host: localhost
  port: 6379

