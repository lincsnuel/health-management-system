server:
  port: 8555

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # If you aren't using Eureka/Consul yet, disable this to avoid conflicts
      discovery:
        locator:
          enabled: false
      routes:
        - id: patient-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/patients/**
          # No filters needed for a direct 1:1 path mapping